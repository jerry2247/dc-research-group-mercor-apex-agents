# Pre-commit hooks. Run on every commit; fail fast.
# Install with: pre-commit install (after `make setup`).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^vendor/
      - id: end-of-file-fixer
        exclude: ^vendor/
      - id: check-yaml
        exclude: ^vendor/
      - id: check-toml
        exclude: ^vendor/
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]
        exclude: ^vendor/
      - id: ruff-format
        exclude: ^vendor/
